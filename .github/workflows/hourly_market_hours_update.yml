name: ValueArc Screener - Hourly

on:
  workflow_dispatch:
  schedule:
    # Run every 30 minutes on weekdays in a broad UTC window.
    # The NY-time gate below ensures the job only runs at:
    # 9:30, 10:30, 11:30, 12:30, 1:30, 2:30, 3:30 ET
    - cron: "*/30 13-21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: valuearc-screener
  cancel-in-progress: false

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check if US market is open and this is an hourly run slot
        id: market_hours
        run: |
          set -euo pipefail

          echo "UTC now: $(date -u)"
          echo "NY now: $(TZ="America/New_York" date)"

          ny_weekday="$(TZ="America/New_York" date +%u)"
          ny_hour="$(TZ="America/New_York" date +%H)"
          ny_min="$(TZ="America/New_York" date +%M)"

          echo "ny_weekday=$ny_weekday"
          echo "ny_hour=$ny_hour"
          echo "ny_min=$ny_min"

          # Monday=1 ... Sunday=7
          if [[ "$ny_weekday" -gt 5 ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Weekend" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only run on the half hour
          if [[ "$ny_min" != "30" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=Not a :30 run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Allow only 09:30 through 15:30 America/New_York
          case "$ny_hour" in
            09|10|11|12|13|14|15)
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "reason=Valid market-hours run slot" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "reason=Outside market-hours run slots" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout repo
        if: steps.market_hours.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.market_hours.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --retries 5 -r requirements.txt

      - name: Prepare output directory
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          mkdir -p outputs
          mkdir -p docs/data

      - name: Run ValueArc screener
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          python scripts/run_screener.py

      - name: Validate published artifacts
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          test -f outputs/valuearc_filtered_TODAY.csv
          test -f outputs/latest_run.json
          test -f docs/data/latest-run.json

      - name: Upload outputs as artifact
        if: steps.market_hours.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: valuearc-hourly-outputs
          path: |
            outputs/
            docs/data/latest-run.json
          retention-days: 14
          if-no-files-found: error

      - name: Commit outputs back to repo
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add outputs/ docs/data/latest-run.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ValueArc screener run ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## ValueArc hourly run"
            echo
            echo "- UTC time: $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "- NY time: $(TZ="America/New_York" date +'%Y-%m-%d %H:%M %Z')"
            echo "- Market window active: ${{ steps.market_hours.outputs.should_run || 'false' }}"
            echo "- Decision: ${{ steps.market_hours.outputs.reason || 'unknown' }}"
            if [[ -f outputs/latest_run.json ]]; then
              echo "- Metadata file: \`outputs/latest_run.json\`"
              python - <<'PY'
          import json
          from pathlib import Path

          p = Path("outputs/latest_run.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          print(f"- Last completed run: {data.get('completed_at_display', 'unknown')}")
          print(f"- Filtered rows: {data.get('filtered_rows', 'unknown')}")
          PY
            else
              echo "- Metadata file not generated in this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
