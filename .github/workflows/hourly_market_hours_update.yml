name: ValueArc Screener - Hourly

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14-20 * * 1-5"

permissions:
  contents: write

concurrency:
  group: valuearc-screener
  cancel-in-progress: false

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check if US market is open
        id: market_hours
        run: |
          set -euo pipefail

          echo "UTC now: $(date -u)"
          echo "NY now: $(TZ="America/New_York" date)"

          ny_weekday="$(TZ="America/New_York" date +%u)"
          ny_hour="$(TZ="America/New_York" date +%H)"
          ny_min="$(TZ="America/New_York" date +%M)"

          if [[ "$ny_weekday" -gt 5 ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$ny_hour" -lt 9 ]] || { [[ "$ny_hour" -eq 9 ]] && [[ "$ny_min" -lt 30 ]]; }; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$ny_hour" -ge 16 ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.market_hours.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.market_hours.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --retries 5 -r requirements.txt

      - name: Prepare output directory
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          mkdir -p outputs

      - name: Run ValueArc screener
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          python scripts/run_screener.py

      - name: Validate published artifacts
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          test -f outputs/valuearc_filtered_TODAY.csv
          test -f outputs/latest_run.json
          test -f docs/data/latest-run.json

      - name: Upload outputs as artifact
        if: steps.market_hours.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: valuearc-hourly-outputs
          path: |
            outputs/
            docs/data/latest-run.json
          retention-days: 14
          if-no-files-found: error

      - name: Commit outputs back to repo
        if: steps.market_hours.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add outputs/ docs/data/latest-run.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ValueArc screener run ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## ValueArc hourly run"
            echo
            echo "- Market window active: ${{ steps.market_hours.outputs.should_run || 'false' }}"
            echo "- Workflow date: $(date -u +'%Y-%m-%d %H:%M UTC')"
            if [[ -f outputs/latest_run.json ]]; then
              echo "- Metadata file: \`outputs/latest_run.json\`"
              python -c "import json, pathlib; data = json.loads(pathlib.Path('outputs/latest_run.json').read_text(encoding='utf-8')); print(f\"- Last completed run: {data.get('completed_at_display', 'unknown')}\"); print(f\"- Filtered rows: {data.get('filtered_rows', 'unknown')}\")"
            else
              echo "- Metadata file not generated in this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
